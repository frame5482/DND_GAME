<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผจญภัย | DND AI Adventure</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&family=Mitr:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <section id="game-screen" class="screen active">
            <aside class="party-sidebar">
                <div class="party-header">
                    <h3><i class="fas fa-users"></i> สมาชิกปาร์ตี้</h3>
                </div>
                <div id="party-list" class="party-list"></div>
                <div class="sidebar-footer">
                    <div class="dice-container">
                        <div id="dice-result" class="dice-roll">20</div>
                        <button id="roll-dice-btn" class="btn-dice"><i class="fas fa-dice-d20"></i> ทอยลูกเต๋า</button>
                    </div>
                    <button id="exit-game-btn" class="btn-exit"><i class="fas fa-door-open"></i> ออกจากเกม</button>
                </div>
            </aside>

            <main class="game-main">
                <div id="chat-log" class="chat-log"></div>
                <div class="chat-input-area">
                    <div class="model-selector-mini">
                        <i class="fas fa-microchip"></i>
                        <select id="current-model-select">
                            <option value="gemini-3-flash">Gemini 3 Flash</option>
                            <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                            <option value="gemini-flash-latest">Gemini 1.5 Flash (Latest)</option>
                            <option value="gemma-3-27b-it">Gemma 3 27B</option>
                            <option value="gemma-3-12b-it">Gemma 3 12B</option>
                            <option value="gemma-3-4b-it">Gemma 3 4B</option>
                            <option value="gemma-3-1b-it">Gemma 3 1B</option>
                            <option value="gemma-3n-e4b-it">Gemma 3n E4B</option>
                            <option value="gemma-3n-e2b-it">Gemma 3n E2B</option>
                        </select>
                    </div>
                    <div class="input-row">
                        <input type="text" id="user-input" placeholder="คุณต้องการทำอะไรต่อ?">
                        <button id="send-btn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </main>
        </section>
    </div>
    <script src="game.js"></script>
</body>
</html>
